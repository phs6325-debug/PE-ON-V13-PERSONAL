<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta id="peon-viewport" name="viewport" content="width=1180, initial-scale=1, minimum-scale=0.2, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    <script>
      (() => {
        const meta = document.getElementById("peon-viewport");
        const deviceWidth = Math.max(320, Math.min(window.screen?.width || 1180, window.screen?.height || 1180));
        const isTouchDevice = window.matchMedia?.("(pointer: coarse)")?.matches || navigator.maxTouchPoints > 0;
        if (meta && isTouchDevice) {
          const scale = Math.max(0.2, Math.min(1, deviceWidth / 1180));
          meta.setAttribute(
            "content",
            `width=1180, initial-scale=${scale.toFixed(3)}, minimum-scale=0.2, maximum-scale=5, user-scalable=yes, viewport-fit=cover`
          );
        } else if (meta) {
          meta.setAttribute(
            "content",
            "width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=5, user-scalable=yes, viewport-fit=cover"
          );
        }
      })();
    </script>
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PE-ON" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>PE-ON V13.2 Personal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
